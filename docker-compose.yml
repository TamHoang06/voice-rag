version: '3.8'

services:
  voice-agent:
    build: .
    container_name: voice-agent-app
    ports:
      - "8000:8000"
    env_file:
      - ./src/.env
    volumes:
      - ./src:/app/src
      - ./outputs:/app/outputs
      - ./data:/app/data
      - ./voices:/app/voices
      - ./static:/app/static
    restart: always
    # Nếu bạn dùng GPU cho F5-TTS, bỏ comment các dòng dưới:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

    services:
  mongodb:
    image: mongo:latest
    container_name: mongodb_container
    env_file:
      - ./src/.env
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
  environment:
  - MONGO_INITDB_ROOT_USERNAME=${MONGO_USER}
  - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASS}

volumes:
  mongo_data: