version: '3.8'

services:
  voice-agent:
    build: .
    container_name: voice-agent-app
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./outputs:/app/outputs
      - ./data:/app/data
      - ./voices:/app/voices
      - ./static:/app/static
    restart: always
    # Nếu bạn dùng GPU cho F5-TTS, bỏ comment các dòng dưới:
