# Voice Agent Configuration

## Application Configuration

### Core Settings
```yaml
app:
  name: "voice-agent"
  version: "1.0.0"
  description: "AI-powered podcast generation platform with RAG, Gemini 2.5 Flash LLM, F5-TTS voice cloning"
  debug: false
  
  # Server configuration
  host: "0.0.0.0"
  port: 8000
  workers: 4
  
  # API documentation
  docs_url: "/docs"
  redoc_url: "/redoc"
  openapi_url: "/openapi.json"
  
  # Logging
  log_level: "INFO"
  log_file: "logs/app.log"
  log_format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
```

## Gemini API Configuration

### Authentication
```yaml
gemini:
  api_key: "${GEMINI_API_KEY}"  # Required environment variable
  
  # Connection settings
  timeout: 30                     # Seconds
  max_retries: 3                 # Retry attempts
  retry_delay: 1                 # Seconds between retries
  
  # API version
  api_version: "v1beta1"
  
  # Model configuration
  model: "gemini-2.5-flash"
  temperature: 0.7               # For text generation
  max_tokens: 8192
```

## RAG (Retrieval-Augmented Generation) Configuration

### Vector Database Settings
```yaml
rag:
  # Vectorstore configuration
  vectorstore_path: "src/vectorstore"
  registry_file: "src/vectorstore/registry.json"
  
  # Document chunking
  chunk_size: 1200               # Characters per chunk
  chunk_overlap: 200             # Character overlap between chunks
  
  # Embedding model
  embedding_model: "sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2"
  embedding_dimension: 384
  
  # Retrieval settings
  similarity_metric: "cosine"
  retrieval_k: 4                 # Number of chunks to retrieve
  
  # Supported languages (automatic detection)
  supported_languages:
    - "vi-VN"    # Vietnamese
    - "en-US"    # English
    - "zh-CN"    # Chinese (Simplified)
    - "ja-JP"    # Japanese
    - "ko-KR"    # Korean
    - "fr-FR"    # French
```

### Document Processing
```yaml
document_processing:
  # Supported file formats
  supported_formats:
    - "pdf"
    - "docx"
    - "txt"
  
  # File size limits
  max_file_size: 52428800        # 50MB
  
  # Image analysis in documents
  enable_image_analysis: true
  min_image_width: 50            # Skip small images (pixels)
  
  # Processing timeouts
  processing_timeout: 300        # Seconds
  
  # Text extraction
  default_language: "vi-VN"
```

## Text-to-Speech (TTS) Configuration

### Gemini TTS
```yaml
tts:
  # Voice settings
  default_voice: "Kore"
  available_voices:
    - "Aoede"      # Female, natural
    - "Charon"     # Male, deep
    - "Fenrir"     # Male, energetic
    - "Puck"       # Male, playful
    - "Schedar"    # Female, bright
    - "Kore"       # Female, warm
    - "Leda"       # Female, soft
    - "Orus"       # Male, commanding
    - "Zephyr"     # Male, smooth
  
  # Chunking for long texts
  max_chunk_size: 4500           # Characters per TTS call
  
  # Audio output settings
  default_output_format: "wav"
  supported_formats:
    - "wav"
    - "mp3"
    - "m4a"
    - "ogg"
    - "flac"
    - "webm"
    - "mp4"
  
  # Audio merging
  chunk_padding_ms: 100          # Silence between chunks
  
  # API rate limiting
  rate_limit_delay: 0.3          # Seconds between API calls
  
  # Language setting
  language: "vi-VN"
```

### Voice Cloning (F5-TTS)
```yaml
voice_cloning:
  # Voice library settings
  voice_library_path: "src/voices"
  active_voice_file: "src/voices/active.json"
  
  # Voice sample requirements
  min_sample_duration: 10        # Seconds
  max_sample_duration: 300       # Seconds
  
  # Supported formats for voice samples
  supported_formats:
    - "wav"
    - "mp3"
    - "m4a"
    - "ogg"
    - "flac"
  
  # Voice metadata
  storage_format: "json"
```

## Speech-to-Text (STT) Configuration

```yaml
stt:
  # Language settings
  default_language: "vi-VN"
  supported_languages:
    - "vi-VN"      # Vietnamese
    - "en-US"      # English (US)
    - "en-GB"      # English (UK)
    - "zh-CN"      # Chinese (Simplified)
    - "zh-TW"      # Chinese (Traditional)
    - "ja-JP"      # Japanese
    - "ko-KR"      # Korean
    - "fr-FR"      # French
    - "es-ES"      # Spanish
    - "de-DE"      # German
  
  # Input audio settings
  max_file_size: 31457280        # 30MB
  supported_formats:
    - "wav"
    - "mp3"
    - "m4a"
    - "ogg"
    - "flac"
    - "webm"
    - "mp4"
  
  # Transcription settings
  default_task: "transcribe"     # "transcribe" or "translate"
  
  # API configuration
  timeout: 120                   # Seconds (for long audio)
```

## Podcast Generation Configuration

```yaml
podcast:
  # Script generation settings
  min_segments: 1
  max_segments: 15
  default_segments: null         # Auto-calculate
  
  # Segment content requirements
  min_words_per_segment: 150
  max_words_per_segment: 280
  words_per_minute: 150          # For duration estimation
  
  # Output settings
  output_path: "src/outputs"
  default_format: "wav"
  
  # Script caching
  cache_enabled: true
  cache_path: "src/app/podcast"
  cache_format: "json"
  
  # Language setting
  language: "vi-VN"
  tone: "informative"            # "informative", "entertaining", "educational"
  
  # Q&A settings
  qa_context_chunks: 4           # Chunks to retrieve for Q&A
  qa_language: "vi-VN"           # Q&A response language
```

## Rate Limiting Configuration

```yaml
rate_limiting:
  # Global rate limiting
  enabled: true
  
  # Requests per window
  default:
    requests: 60
    window_seconds: 60
  
  # Endpoint-specific limits
  limits:
    upload:
      requests: 5                # Strict limit for upload
      window_seconds: 60
    
    tts:
      requests: 20
      window_seconds: 60
    
    stt:
      requests: 20
      window_seconds: 60
    
    ask:
      requests: 30
      window_seconds: 60
    
    podcast_generate:
      requests: 10
      window_seconds: 60
  
  # IP-based limits (optional)
  ip_based: false
  
  # User-based limits (optional, if auth implemented)
  user_based: false
```

## Database Configuration

```yaml
database:
  # SQLite (development)
  url: "sqlite:///./app.db"
  
  # PostgreSQL (production)
  # url: "postgresql://user:password@host:5432/voice_agent"
  
  # Connection settings
  pool_size: 10
  max_overflow: 20
  pool_timeout: 30
  pool_recycle: 3600
  
  # Echo SQL (debugging)
  echo: false
```

## Storage Configuration

```yaml
storage:
  # Document storage
  documents_path: "src/data"
  
  # Generated outputs
  outputs_path: "src/outputs"
  
  # Vector database
  vectorstore_path: "src/vectorstore"
  
  # Voice library
  voices_path: "src/voices"
  
  # Model cache
  model_cache_path: "model_cache"
  
  # Temporary files
