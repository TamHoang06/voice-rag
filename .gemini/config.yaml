## Development vs Production Configuration

### Development (.env.development)
```yaml
app:
  debug: true
  log_level: "DEBUG"

gemini:
  timeout: 30

database:
  url: "sqlite:///./app.db"

security:
  cors:
    allow_origins: ["*"]
```

### Production (.env.production)
```yaml
app:
  debug: false
  log_level: "INFO"
  workers: 4

gemini:
  timeout: 60
  max_retries: 5

database:
  url: "postgresql://user:pass@prod-db:5432/voice_agent"

security:
  cors:
    allow_origins: ["https://yourdomain.com"]
  https:
    enabled: true
  api_key:
    enabled: true
```

## Configuration Loading Order

1. Default values in code
2. `config.yaml` file
3. Environment variables (override config.yaml)
4. Runtime configuration updates

Example:
```python
# src/app/config.py
import os
import yaml

# Load YAML config
with open("config.yaml") as f:
    config = yaml.safe_load(f)

# Override with environment variables
GEMINI_API_KEY = os.getenv("GEMINI_API_KEY", config["gemini"]["api_key"])
RATE_LIMIT_REQUESTS = int(os.getenv("RATE_LIMIT_REQUESTS", config["rate_limiting"]["default"]["requests"]))
```

## Configuration Validation

```python
# Validate configuration on startup
def validate_config():
    """Validate configuration settings."""
    
    # Check required values
    if not GEMINI_API_KEY:
        logger.warning("GEMINI_API_KEY not configured: TTS/STT unavailable")
    
    # Validate paths exist
    if not os.path.exists(VECTORSTORE_PATH):
        logger.info(f"Creating {VECTORSTORE_PATH}")
        os.makedirs(VECTORSTORE_PATH, exist_ok=True)
    
    # Validate settings
    if CHUNK_SIZE < 100:
        raise ValueError("CHUNK_SIZE must be >= 100")
    
    if CHUNK_OVERLAP >= CHUNK_SIZE:
        raise ValueError("CHUNK_OVERLAP must be < CHUNK_SIZE")
    
    logger.info("Configuration validation passed")
```
