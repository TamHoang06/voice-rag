```

## Security Configuration

```yaml
security:
  # CORS (Cross-Origin Resource Sharing)
  cors:
    enabled: true
    allow_origins:
      - "http://localhost:3000"
      - "http://localhost:8000"
    allow_credentials: true
    allow_methods: ["*"]
    allow_headers: ["*"]
  
  # HTTPS
  https:
    enabled: false               # Enable in production
    certfile: "/path/to/cert.pem"
    keyfile: "/path/to/key.pem"
  
  # API key authentication
  api_key:
    enabled: false               # Enable in production
    header_name: "X-API-Key"
  
  # JWT tokens (optional)
  jwt:
    enabled: false
    secret_key: "${JWT_SECRET_KEY}"
    algorithm: "HS256"
    expiration_minutes: 1440
  
  # File upload security
  file_upload:
    scan_viruses: false
    max_file_size: 52428800      # 50MB
    allowed_extensions:
      - "pdf"
      - "docx"
      - "txt"
      - "wav"
      - "mp3"
      - "m4a"
      - "ogg"
      - "flac"
```

## Logging Configuration

```yaml
logging:
  # Log level
  level: "INFO"
  
  # Output destinations
  outputs:
    console:
      enabled: true
      format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
    
    file:
      enabled: true
      path: "logs/app.log"
      max_size: 10485760         # 10MB
      backup_count: 5
      format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  
  # Log modules
  modules:
    uvicorn: "INFO"
    fastapi: "INFO"
    langchain: "WARNING"
    sentence_transformers: "WARNING"
    google.auth: "WARNING"
  
  # Structured logging
  structured: true
  json_format: false
```

